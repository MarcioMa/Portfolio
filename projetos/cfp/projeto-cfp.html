<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalhes do Projeto | Marcio Macedo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bg-dark-blue { background-color: #2c3e50; color: white; }
        .section-padding { padding: 50px 0; }
        
        /* Estilo da Galeria com Efeito */
        .img-hover-zoom {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .img-hover-zoom:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .img-hover-zoom img {
            width: 100%;
            height: auto;
            display: block;
        }
        .badge-custom { background-color: #34495e; margin-right: 5px; }
    </style>
</head>
<body>

    <header class="bg-dark-blue py-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h2 class="mb-0">Detalhes do Projeto</h2>
            <a href="../../index.html" class="btn btn-outline-light btn-sm">← Voltar ao Início</a>
        </div>
    </header>

    <main class="container section-padding">
        <div class="row">
            <div class="col-lg-5 mb-5">
                <div class="card border-0 shadow-sm p-4">
                    <h1 id="titulo-projeto" class="text-primary mb-3 h2">Título do Projeto</h1>
                    
                    <h5 class="fw-bold">Resumo</h5>
                    <p id="resumo-projeto" class="text-muted small">
                        </p>

                    <h5 class="fw-bold mt-4">Tecnologias Utilizadas</h5>
                    <div id="tech-badges" class="mb-4">
                        </div>

                    <h5 class="fw-bold">Competências Adquiridas</h5>
                    <ul id="competencias-lista" class="text-muted small">
                        </ul>
                </div>
            </div>

            <div class="col-lg-7">
                <h4 class="mb-4">Galeria do Sistema</h4>
                <div class="row g-3">
                    <div class="col-md-6 img-hover-zoom">
                        <img src="img/print1.png" alt="Tela 1">
                    </div>
                    <div class="col-md-6 img-hover-zoom">
                        <img src="img/print2.png" alt="Tela 2">
                    </div>
                    <div class="col-md-6 img-hover-zoom">
                        <img src="img/print3.png" alt="Tela 3">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark-blue text-center py-3">
        <small>&copy; 2026 Marcio Macedo de Araujo</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
